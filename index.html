<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ارفع علم الأردن 🇯🇴</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:linear-gradient(180deg,#0a1628 0%,#1a2d5a 45%,#0d4a2e 100%);
      background-attachment:fixed;
      display:flex;flex-direction:column;align-items:center;
      justify-content:flex-start;
      font-family:'Tajawal',sans-serif;direction:rtl;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      position:relative;
      padding:24px 16px 40px;
      color:#fff;
    }
    .star{position:fixed;background:#fff;border-radius:50%;animation:twinkle linear infinite alternate;pointer-events:none;z-index:0}
    .confetti-piece{position:fixed;top:-20px;width:10px;height:10px;animation:confettiFall linear infinite;z-index:200;pointer-events:none}

    #loading-screen{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;
      min-height:80vh;z-index:1;
    }
    #loading-screen p{color:rgba(255,255,255,.6);font-size:.95rem}
    .spinner{width:44px;height:44px;border:3px solid rgba(255,215,0,.2);border-top-color:#FFD700;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #retry-btn{
      margin-top:8px;padding:10px 28px;font-size:.9rem;font-weight:700;
      font-family:'Tajawal',sans-serif;
      background:rgba(255,255,255,.1);color:#FFD700;
      border:1px solid rgba(255,215,0,.4);border-radius:50px;cursor:pointer;
      display:none;
    }

    #app{display:none;flex-direction:column;align-items:center;width:100%;z-index:1;padding-top:10px}
    h1{font-size:clamp(1.3rem,5vw,2.2rem);font-weight:900;text-align:center;margin-bottom:6px;color:#FFD700}
    .subtitle{color:rgba(255,255,255,.65);text-align:center;margin-bottom:14px;font-size:.9rem}

    #info-card{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,215,0,.25);
      border-radius:14px;padding:10px 20px;
      margin-bottom:14px;text-align:center;
      width:min(300px,92vw);
    }
    .info-row{font-size:.85rem;color:rgba(255,255,255,.8);padding:3px 0;font-weight:700}
    .info-row.uni{font-size:.95rem;color:#FFD700;font-weight:900}
    .info-row.accent{color:#7fff9a}
    .info-row.doctor{color:#fff;font-weight:900}
    .info-divider{height:1px;background:rgba(255,215,0,.15);margin:5px 0}

    #live-badge{font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:5px}
    .live-dot{display:inline-block;width:7px;height:7px;background:#4caf50;border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}

    #flag-scene{position:relative;width:200px;height:220px;margin-bottom:14px;flex-shrink:0}
    #ground{
      position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:100px;height:9px;
      background:linear-gradient(90deg,#8B6914,#C8A700,#8B6914);
      border-radius:5px;
    }
    #flag-wrapper{position:absolute;bottom:7px;left:50%;transform:translateX(-50%)}
    #flag-group{transition:transform 0.9s cubic-bezier(.34,1.56,.64,1)}
    #height-track{position:absolute;right:0;top:10px;bottom:10px;width:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
    #height-fill{position:absolute;bottom:0;width:100%;height:0%;background:linear-gradient(to top,#CE1126,#FFD700,#007A3D);border-radius:3px;transition:height 1s}

    #vote-count{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;text-align:center;line-height:1;margin-bottom:3px}
    #vote-label{color:rgba(255,255,255,.45);margin-bottom:16px;font-size:.82rem;text-align:center}
    #progress-track{width:min(300px,88vw);height:9px;background:rgba(255,255,255,.1);border-radius:10px;margin-bottom:20px;overflow:hidden}
    #progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#CE1126,#FFD700,#007A3D);border-radius:10px;transition:width 1s}

    #btn-wrap{position:relative;margin-bottom:6px}
    #vote-btn{
      padding:14px 44px;font-size:1rem;font-weight:700;font-family:'Tajawal',sans-serif;
      background:linear-gradient(135deg,#007A3D,#00a84f);color:#fff;
      border:2px solid rgba(255,215,0,.5);border-radius:50px;cursor:pointer;
      transition:transform .2s;box-shadow:0 6px 24px rgba(0,122,61,.5);
      position:relative;-webkit-tap-highlight-color:transparent;
    }
    #vote-btn:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.15);box-shadow:none;cursor:default}
    #vote-btn:not(:disabled):active{transform:scale(.96)}
    .ripple{position:absolute;inset:0;border-radius:50px;background:rgba(255,215,0,.4);animation:rippleAnim .8s ease-out forwards;pointer-events:none}

    #celebration{display:none;flex-direction:column;align-items:center;text-align:center;animation:celebPulse 1.5s infinite}
    #celebration .emoji{font-size:2.8rem;margin-bottom:6px}
    #celebration .cel-title{font-size:1.3rem;font-weight:900;color:#FFD700}
    #celebration .cel-sub{color:rgba(255,255,255,.7);margin-top:6px;font-size:.9rem}

    .share-hint{color:rgba(255,255,255,.3);font-size:.72rem;margin-top:20px;text-align:center;padding:0 16px}

    @keyframes twinkle{from{opacity:.1}to{opacity:.9}}
    @keyframes rippleAnim{0%{transform:scale(1);opacity:.7}100%{transform:scale(4);opacity:0}}
    @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes celebPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>

<div id="stars"></div>

<div id="loading-screen">
  <div class="spinner"></div>
  <p id="loading-msg">جاري الاتصال...</p>
  <button id="retry-btn" onclick="connectFirebase()">🔄 إعادة المحاولة</button>
</div>

<div id="app">
  <h1>🇯🇴 ارفع علم الأردن معنا</h1>
  <p class="subtitle">كل صوت يرفع العلم خطوة للأعلى</p>

  <div id="info-card">
    <div class="info-row uni">🎓 الجامعة الأردنية</div>
    <div class="info-divider"></div>
    <div class="info-row">كلية العلوم التربوية</div>
    <div class="info-row accent">الدبلوم العالي لإعداد المعلمين</div>
  </div>

  <div id="live-badge"><span class="live-dot"></span> مباشر — الأصوات تتحدث فورياً</div>

  <div id="flag-scene">
    <div id="flag-wrapper">
      <svg viewBox="0 0 120 160" width="105" height="155">
        <defs>
          <linearGradient id="poleGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#a07820"/>
            <stop offset="40%" stop-color="#e8c84a"/>
            <stop offset="100%" stop-color="#a07820"/>
          </linearGradient>
        </defs>
        <rect x="36" y="2" width="4" height="158" fill="rgba(0,0,0,0.2)" rx="2"/>
        <rect x="34" y="0" width="4" height="160" fill="url(#poleGrad)" rx="2"/>
        <circle cx="36" cy="4" r="5" fill="#e8c84a"/>
        <circle cx="36" cy="3" r="3" fill="#fff8dc" opacity="0.6"/>
        <g id="flag-group" transform="translate(0,140)">
          <rect x="38" y="0"  width="72" height="12" fill="#000000"/>
          <rect x="38" y="12" width="72" height="12" fill="#FFFFFF"/>
          <rect x="38" y="24" width="72" height="12" fill="#007A3D"/>
          <polygon points="38,0 38,36 71,18" fill="#CE1126"/>
          <polygon id="star7" fill="#FFFFFF"/>
        </g>
      </svg>
    </div>
    <div id="ground"></div>
    <div id="height-track"><div id="height-fill"></div></div>
  </div>

  <div id="vote-count">0</div>
  <div id="vote-label">صوت من أصل 2,000</div>
  <div id="progress-track"><div id="progress-fill"></div></div>

  <div id="btn-wrap">
    <button id="vote-btn" onclick="castVote()">🏴 ارفع العلم</button>
  </div>
  <div id="celebration">
    <div class="emoji">🎉</div>
    <div class="cel-title">العلم وصل للقمة!</div>
    <div class="cel-sub">شكراً لجميع المشاركين 🇯🇴</div>
  </div>
  <p class="share-hint">شارك هذا الرابط مع أصدقائك ليشاركوا في رفع العلم</p>
</div>

<!-- Firebase Compat SDK — يعمل على جميع المتصفحات بما فيها Safari/iPhone -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var MAX_VOTES = 2000;
var DB_URL = "https://rise-our-flage-default-rtdb.asia-southeast1.firebasedatabase.app";
var hasVoted = localStorage.getItem("jordan_flag_voted") === "1";
var votesRef = null;
var appStarted = false;
var timeoutHandle = null;

// ── Stars ─────────────────────────────────────────────────
(function(){
  var wrap = document.getElementById("stars");
  for(var i=0;i<28;i++){
    var s=document.createElement("div"); s.className="star";
    var sz=Math.random()*2+0.8;
    s.style.width=sz+"px"; s.style.height=sz+"px";
    s.style.top=Math.random()*100+"%"; s.style.left=Math.random()*100+"%";
    s.style.opacity=Math.random()*0.5+0.1;
    s.style.animationDuration=(Math.random()*3+2)+"s";
    s.style.animationDelay=(Math.random()*4)+"s";
    wrap.appendChild(s);
  }
})();

// ── Seven-pointed star ────────────────────────────────────
(function(){
  var cx=51.7,cy=18,r=6.5,inner=r*0.45,n=7,pts=[];
  for(var i=0;i<n*2;i++){
    var a=(Math.PI/n)*i-Math.PI/2,rad=i%2===0?r:inner;
    pts.push((cx+rad*Math.cos(a)).toFixed(2)+","+(cy+rad*Math.sin(a)).toFixed(2));
  }
  document.getElementById("star7").setAttribute("points",pts.join(" "));
})();

// ── Update UI ─────────────────────────────────────────────
function updateUI(votes){
  var pct=Math.min((votes/MAX_VOTES)*100,100);
  document.getElementById("vote-count").textContent=votes.toLocaleString("ar-EG");
  document.getElementById("progress-fill").style.width=pct+"%";
  document.getElementById("height-fill").style.height=pct+"%";
  document.getElementById("flag-group").setAttribute("transform","translate(0,"+(140-pct*1.3)+")");
  if(hasVoted){
    var b=document.getElementById("vote-btn");
    b.textContent="✅ شكراً لمشاركتك!";
    b.disabled=true;
  }
  if(votes>=MAX_VOTES) showCelebration();
}

// ── Show app ──────────────────────────────────────────────
function showApp(){
  if(appStarted) return;
  appStarted=true;
  if(timeoutHandle) clearTimeout(timeoutHandle);
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").style.display="flex";
}

// ── Error handler ─────────────────────────────────────────
function onError(){
  if(appStarted) return;
  document.getElementById("loading-msg").textContent="❌ تعذّر الاتصال";
  document.getElementById("retry-btn").style.display="inline-block";
  document.querySelector(".spinner").style.display="none";
}

// ── Connect Firebase ──────────────────────────────────────
function connectFirebase(){
  document.getElementById("retry-btn").style.display="none";
  document.querySelector(".spinner").style.display="block";
  document.getElementById("loading-msg").textContent="جاري الاتصال...";
  appStarted=false;

  try {
    var app;
    try { app=firebase.app("jordan-flag"); }
    catch(e){ app=firebase.initializeApp({databaseURL:DB_URL},"jordan-flag"); }

    var db=firebase.database(app);
    votesRef=db.ref("jordan_flag/votes");

    votesRef.on("value",function(snap){
      var v=snap.val()||0;
      showApp();
      updateUI(v);
    },function(){ onError(); });

    // Timeout for slow connections
    timeoutHandle=setTimeout(function(){ if(!appStarted) onError(); },12000);

  } catch(e){ onError(); }
}

// ── Cast vote ─────────────────────────────────────────────
function castVote(){
  if(hasVoted||!votesRef) return;
  addRipple();
  votesRef.transaction(function(current){
    return (current||0)+1;
  },function(err,committed){
    if(!err&&committed){
      hasVoted=true;
      localStorage.setItem("jordan_flag_voted","1");
      document.getElementById("vote-btn").textContent="✅ شكراً لمشاركتك!";
      document.getElementById("vote-btn").disabled=true;
    } else {
      alert("حدث خطأ، حاول مجدداً");
    }
  });
}

// ── Ripple ────────────────────────────────────────────────
function addRipple(){
  var w=document.getElementById("btn-wrap");
  var r=document.createElement("div"); r.className="ripple"; w.appendChild(r);
  setTimeout(function(){ if(r.parentNode) r.parentNode.removeChild(r); },850);
}

// ── Celebration ───────────────────────────────────────────
function showCelebration(){
  document.getElementById("btn-wrap").style.display="none";
  var c=document.getElementById("celebration"); c.style.display="flex";
  var colors=["#CE1126","#007A3D","#FFD700","#fff","#000"];
  for(var i=0;i<25;i++){
    var p=document.createElement("div"); p.className="confetti-piece";
    p.style.left=Math.random()*100+"vw";
    p.style.background=colors[i%colors.length];
    p.style.borderRadius=i%2===0?"50%":"2px";
    p.style.animationDuration=(Math.random()*3+2.5)+"s";
    p.style.animationDelay=(Math.random()*2)+"s";
    document.body.appendChild(p);
  }
}

// ── Start ─────────────────────────────────────────────────
connectFirebase();
</script>
</body>
</html>
